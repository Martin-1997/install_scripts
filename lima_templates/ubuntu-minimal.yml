# Start VM with
# limactl start --name=lima-unix-setup ./ubuntu-minimal.yml

minimumLimaVersion: 2.0.0

vmType: vz
os: Linux
arch: aarch64

cpus: 4
memory: "4GiB"
disk: "60GiB"

base:
- template:_images/ubuntu-lts
  # Do NOT include this if you do not want the user's home mounted by default:
  # - template:_default/mounts

mounts:
  - location: "~/.unix_setup/public"
    mountPoint: "/home/martin.guest/.unix_setup/public"
    # mountPoint: "/home/martin.guest/workspace/"
    writable: true
  - location: "~/.claude"
    mountPoint: "/home/martin.guest/.claude"
    writable: false   # true if you want Claude Code in the VM to write back

